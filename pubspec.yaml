name: iot_monitor
description: "IoT Monitor — Neo-Brutalist Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.1.4
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.2.0
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  lucide_icons_flutter: ^3.1.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^10.0.0
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1  # ← додано

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"              # основна іконка
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"        # білий фон
  adaptive_icon_foreground: "assets/icon_foreground.png"  # з відступами

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png  # ← розкоментовано